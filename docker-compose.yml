version: '3.8'

services:
  # 1. Database Service (MySQL)
  db:
    image: mysql:8.0
    container_name: cinema_db
    restart: always
    command: --lower_case_table_names=1
    environment:
      MYSQL_ROOT_PASSWORD: "123123"
      MYSQL_DATABASE: "cinema_cgv"
    ports:
      # Đổi cổng máy host thành 3307 để tránh trùng với MySQL đang chạy trên máy của bạn
      - "3306:3306"
    volumes:
      - db_data2:/var/lib/mysql
      # Mount SQL file to automatically seed the database on first run
      - ./be-cdtn/cgv_cdtn.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Cache Service (Redis)
  redis:
    image: redis:alpine
    container_name: cinema_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass "123456"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data2:
  redis_data:
